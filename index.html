<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro P2P Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <strong>SatMarket P2P</strong>
            <div>
                <a href="/">Swap</a>
                <a href="/new-listing.html" class="btn-sm"> + Postavi Oglas</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header style="text-align: center; margin: 20px 0;">
            <h1>P2P Razmena bez posrednika</h1>
            <p>Trguj direktno u Satoshi-ma (Sats)</p>
        </header>

        <div id="listings-grid" class="grid">
            <p style="text-align: center; grid-column: 1/-1;">Učitavam oglase...</p>
        </div>
    </div>

    <script>
        async function loadListings() {
            try {
                const res = await fetch('/api/listings');
                const data = await res.json();
                const grid = document.getElementById('listings-grid');
                
                if (data.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Trenutno nema aktivnih oglasa.</p>';
                    return;
                }

                grid.innerHTML = data.map(l => `
                    <div class="card">
                        <div class="card-header">
                            <span class="badge">${l.offer_name}</span> ➔ <span class="badge">${l.want_name}</span>
                        </div>
                        <div class="card-body">
                            <h2>${l.offer_amount} ➔ ${l.want_amount}</h2>
                            <p>Prodavac: <strong>${l.seller_id}</strong></p>
                            <p class="desc">${l.description || 'Nema opisa.'}</p>
                        </div>
                        <button onclick="window.location='/listing.html?id=${l.id}'" class="btn-main">Zameni</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Greška pri učitavanju:", err);
            }
        }
        
        loadListings();
    </script>
</body>
</html>
